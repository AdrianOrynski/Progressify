  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

0%, rgba(255,206,58,.06), transparent 60%),\n      radial-gradient(140% 120% at 50% 120%, rgba(0,0,0,.6), transparent 55%),\n      var(--bg);\n    color:var(--cream);\n    font-family:var(--body);\n    font-size:30px;\n    line-height:1.45;\n    overflow:hidden;\n    -webkit-font-smoothing:antialiased;\n  }\n  /* subtle parchment grain via repeating lines */\n  deck-stage section::after{\n    content:\"\";position:absolute;inset:0;pointer-events:none;\n    background-image:repeating-linear-gradient(135deg, rgba(255,255,255,.012) 0 2px, transparent 2px 5px);\n    mix-blend-mode:screen;opacity:.5;\n  }\n\n  /* ---------- chrome ---------- */\n  .eyebrow{\n    font-family:var(--mono);\n    font-size:24px;letter-spacing:.42em;text-transform:uppercase;\n    color:var(--gold);font-weight:500;\n    display:flex;align-items:center;gap:16px;\n  }\n  .eyebrow::before{content:\"\";width:42px;height:2px;background:linear-gradient(90deg,var(--gold),transparent);}\n  .eyebrow.crimson{color:var(--crimson);}\n  .eyebrow.crimson::before{background:linear-gradient(90deg,var(--crimson),transparent);}\n\n  h1,h2,h3{margin:0;font-family:var(--display);font-weight:800;color:var(--gold);line-height:1.05;}\n  .title-xl{font-size:120px;font-weight:900;letter-spacing:.01em;text-transform:uppercase;}\n  .title-lg{font-size:78px;letter-spacing:.005em;text-transform:uppercase;}\n  .title-md{font-size:58px;text-transform:uppercase;}\n\n  /* footer chrome */\n  .foot{\n    position:absolute;left:110px;right:110px;bottom:40px;\n    display:flex;align-items:center;justify-content:space-between;\n    font-family:var(--mono);font-size:22px;letter-spacing:.12em;color:var(--muted-2);\n    text-transform:uppercase;\n  }\n  .foot .brand{display:flex;align-items:center;gap:12px;color:var(--muted);}\n  .foot .brand b{color:var(--gold-deep);font-weight:600;}\n  .presenter{display:flex;align-items:center;gap:10px;color:var(--cream-dim);}\n  .presenter .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 10px var(--gold);}\n  .presenter.adrian .dot{background:var(--c-bard);box-shadow:0 0 10px var(--c-bard);}\n\n  /* card primitive */\n  .card{\n    background:linear-gradient(160deg,var(--card-2),var(--card));\n    border:1.5px solid var(--line);\n    border-radius:18px;\n    padding:34px 36px;\n    position:relative;\n  }\n  .card.glow{box-shadow:0 0 0 1px rgba(255,206,58,.05),0 24px 60px -30px rgba(0,0,0,.9);}\n\n  .pill{\n    display:inline-flex;align-items:center;gap:10px;\n    font-family:var(--mono);font-size:22px;letter-spacing:.14em;text-transform:uppercase;\n    padding:9px 18px;border-radius:999px;border:1.5px solid var(--line);\n    color:var(--gold);background:rgba(255,206,58,.05);\n  }\n\n  .lead{font-size:34px;line-height:1.5;color:var(--cream-dim);font-weight:300;max-width:1180px;}\n  .lead b,.hl{color:var(--gold-bright);font-weight:600;}\n  strong{color:var(--cream);font-weight:600;}\n\n  /* ---------- HERO / title ---------- */\n  section.hero{\n    align-items:center;justify-content:center;text-align:center;\n    background:\n      radial-gradient(90% 70% at 50% 30%, rgba(255,206,58,.10), transparent 60%),\n      radial-gradient(120% 120% at 50% 120%, rgba(0,0,0,.7), transparent 55%),\n      var(--bg);\n  }\n  .crest{font-size:64px;filter:drop-shadow(0 0 24px rgba(255,206,58,.4));}\n  .frame-line{height:2px;width:min(720px,60%);background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto;}\n\n  /* ---------- list / steps ---------- */\n  ul.clean{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:18px;}\n  ul.clean li{display:flex;gap:18px;align-items:flex-start;font-size:29px;color:var(--cream-dim);line-height:1.4;}\n  ul.clean li .bullet{flex:none;margin-top:4px;color:var(--gold);font-size:22px;}\n  ul.clean li b{color:var(--cream);}\n\n  /* transform rows */\n  .xrow{display:flex;align-items:center;gap:28px;}\n  .xrow .from{font-family:var(--mono);font-size:26px;color:var(--muted);text-decoration:line-through;text-decoration-color:var(--muted-2);}\n  .xrow .arrow{color:var(--gold);font-size:30px;}\n  .xrow .to{font-size:34px;font-weight:600;color:var(--gold-bright);}\n\n  /* diagrams */\n  .node{\n    border:1.5px solid var(--line);border-radius:14px;background:linear-gradient(160deg,var(--card-2),var(--card));\n    padding:22px 26px;display:flex;flex-direction:column;gap:6px;\n  }\n  .node .n-title{font-family:var(--display);font-size:30px;color:var(--gold);font-weight:700;}\n  .node .n-sub{font-family:var(--mono);font-size:21px;letter-spacing:.06em;color:var(--muted);}\n  .flow-arrow{display:flex;align-items:center;justify-content:center;color:var(--gold-deep);font-size:34px;}\n\n  .codeblock{\n    font-family:var(--mono);font-size:24px;line-height:1.7;white-space:pre-wrap;\n    background:#0a0704;border:1.5px solid var(--line-soft);border-radius:14px;padding:26px 30px;color:var(--cream-dim);\n  }\n  .codeblock .k{color:var(--c-bard);}\n  .codeblock .s{color:var(--c-lorekeeper);}\n  .codeblock .c{color:var(--muted-2);}\n  .codeblock .g{color:var(--gold);}\n\n  /* demo slide */\n  section.demo{\n    background:\n      radial-gradient(90% 90% at 16% 50%, rgba(232,68,63,.10), transparent 55%),\n      radial-gradient(120% 120% at 50% 120%, rgba(0,0,0,.7), transparent 55%),\n      var(--bg);\n  }\n  .demo-badge{\n    display:inline-flex;align-items:center;gap:14px;\n    font-family:var(--mono);font-size:22px;letter-spacing:.22em;text-transform:uppercase;\n    padding:12px 24px;border-radius:999px;border:1.5px solid rgba(232,68,63,.5);\n    background:rgba(232,68,63,.10);color:#ff7b76;font-weight:500;\n  }\n  .live-dot{width:13px;height:13px;border-radius:50%;background:var(--crimson);box-shadow:0 0 0 0 rgba(232,68,63,.7);}\n  .look-phone{\n    display:flex;align-items:center;gap:18px;\n    font-family:var(--mono);font-size:24px;letter-spacing:.1em;color:var(--gold);text-transform:uppercase;\n  }\n  .look-phone .ar{font-size:40px;animation:none;}\n\n  /* class grid */\n  .class-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}\n  .class-card{\n    border-radius:16px;padding:26px 28px;position:relative;overflow:hidden;\n    border:1.5px solid var(--cc,var(--line));\n    background:linear-gradient(160deg,color-mix(in srgb,var(--cc) 14%,var(--card)),var(--card));\n  }\n  .class-card .cc-icon{font-size:40px;line-height:1;}\n  .class-card .cc-class{font-family:var(--mono);font-size:21px;letter-spacing:.18em;text-transform:uppercase;color:var(--cc);font-weight:600;margin-top:14px;}\n  .class-card .cc-name{font-family:var(--display);font-size:34px;font-weight:700;color:var(--cream);margin-top:6px;}\n  .class-card .cc-disc{font-size:22px;color:var(--muted);margin-top:4px;}\n\n  /* feature grid */\n  .feat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:22px;}\n  .feat{display:flex;gap:22px;align-items:flex-start;}\n  .feat .f-ic{font-size:38px;flex:none;width:64px;height:64px;display:flex;align-items:center;justify-content:center;border-radius:14px;background:rgba(255,206,58,.07);border:1.5px solid var(--line);}\n  .feat .f-t{font-family:var(--display);font-size:28px;font-weight:700;color:var(--gold);}\n  .feat .f-d{font-size:23px;color:var(--cream-dim);line-height:1.4;}\n\n  /* stat / formula */\n  .formula{\n    font-family:var(--mono);font-size:42px;color:var(--cream);text-align:center;\n    background:#0a0704;border:1.5px solid var(--line);border-radius:18px;padding:40px;letter-spacing:.02em;\n  }\n  .formula .var{color:var(--gold-bright);}\n  .formula .op{color:var(--muted);}\n  .chip-row{display:flex;gap:16px;flex-wrap:wrap;}\n  .chip{font-family:var(--mono);font-size:24px;padding:12px 20px;border-radius:12px;border:1.5px solid var(--line);background:rgba(255,206,58,.04);color:var(--cream-dim);}\n  .chip b{color:var(--gold);}\n\n  /* progress bars (skills) */\n  .bar{height:14px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden;}\n  .bar>span{display:block;height:100%;border-radius:999px;background:var(--cc,var(--gold));}\n\n  /* two-col layout */\n  .cols{display:grid;gap:56px;flex:1;min-height:0;}\n  .cols.c12{grid-template-columns:1fr;}\n  .cols.c21{grid-template-columns:1.1fr .9fr;}\n  .cols.c11{grid-template-columns:1fr 1fr;}\n\n  .head-block{display:flex;flex-direction:column;gap:18px;margin-bottom:44px;}\n  .body-fill{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0;}\n\n  /* entrance */\n  @media (prefers-reduced-motion:no-preference){\n    [data-deck-active] .anim{opacity:0;transform:translateY(22px);animation:rise .6s cubic-bezier(.2,.7,.3,1) forwards;}\n    [data-deck-active] .anim.d1{animation-delay:.06s;}\n    [data-deck-active] .anim.d2{animation-delay:.14s;}\n    [data-deck-active] .anim.d3{animation-delay:.22s;}\n    [data-deck-active] .anim.d4{animation-delay:.30s;}\n    [data-deck-active] .anim.d5{animation-delay:.38s;}\n    [data-deck-active] .anim.d6{animation-delay:.46s;}\n    [data-deck-active] .live-dot{animation:pulse 1.6s ease-out infinite;}\n    [data-deck-active] section.demo .look-phone .ar{animation:nudge 1.4s ease-in-out infinite;}\n  }\n  @keyframes rise{to{opacity:1;transform:none;}}\n  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(232,68,63,.6);}70%{box-shadow:0 0 0 16px rgba(232,68,63,0);}100%{box-shadow:0 0 0 0 rgba(232,68,63,0);}}\n  @keyframes nudge{0%,100%{transform:translateX(0);}50%{transform:translateX(12px);}}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<deck-stage width=\"1920\" height=\"1080\" no-rail=\"\">\n\n  <!-- ============ 1 · TITLE ============ -->\n  <section class=\"hero\" data-label=\"Title\">\n    <div class=\"anim d1\" style=\"display:flex;gap:26px;align-items:center;font-size:60px;\">\n      <span class=\"crest\">⚔️<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"anim d1\" style=\"margin:18px 0 6px;font-family:var(--mono);letter-spacing:.5em;font-size:24px;color:var(--gold-deep);text-transform:uppercase;\">Mobile app · Android<\u002Fdiv>\n    <h1 class=\"title-xl anim d2\" style=\"text-shadow:0 0 50px rgba(255,206,58,.25);\">Progressify<\u002Fh1>\n    <div class=\"frame-line anim d3\" style=\"margin-top:30px;\"><\u002Fdiv>\n    <p class=\"lead anim d4\" style=\"margin-top:30px;text-align:center;max-width:1080px;\">\n      Turn everyday tasks into an <span class=\"hl\">RPG<\u002Fspan> — earn experience,\n      level up your skills and play as your own hero.\n    <\u002Fp>\n    <div class=\"anim d5\" style=\"display:flex;gap:40px;margin-top:60px;font-family:var(--mono);font-size:26px;letter-spacing:.1em;color:var(--cream-dim);\">\n      <span>🛡️ Adrian Oryński<\u002Fspan>\n      <span style=\"color:var(--gold-deep);\">·<\u002Fspan>\n      <span>🗡️ Bartosz Lubański<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 2 · PROBLEM ============ -->\n  <section data-label=\"Problem\">\n    <div class=\"head-block\">\n      <div class=\"eyebrow anim d1\">Intro<\u002Fdiv>\n      <h2 class=\"title-lg anim d2\">Motivation always<br>fizzles out<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"body-fill\">\n      <p class=\"lead anim d3\" style=\"margin-bottom:46px;\">\n        The gym, learning a language, coding. <strong>The first week is great, the second a bit weaker,\n        the third… well, exactly.<\u002Fstrong>\n      <\u002Fp>\n      <div class=\"card glow anim d4\" style=\"max-width:1080px;\">\n        <div style=\"font-family:var(--display);font-size:46px;color:var(--gold);font-weight:800;line-height:1.1;\">\n          The problem isn't you.\n        <\u002Fdiv>\n        <div style=\"font-size:32px;color:var(--cream-dim);margin-top:14px;\">\n          The problem is that <span class=\"hl\">plain to-do lists are boring<\u002Fspan> — you tick a checkbox and nothing happens.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><div class=\"brand\"><b>PROGRESSIFY<\u002Fb><\u002Fdiv><div class=\"presenter adrian\"><span class=\"dot\"><\u002Fspan>Adrian<\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 3 · KONCEPT ============ -->\n  <section data-label=\"Concept\">\n    <div class=\"head-block\">\n      <div class=\"eyebrow anim d1\">Concept<\u002Fdiv>\n      <h2 class=\"title-lg anim d2\">To-do list → adventure<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"body-fill\" style=\"gap:0;\">\n      <p class=\"lead anim d2\" style=\"margin-bottom:50px;\">\n        Progressify wraps productivity in RPG mechanics. Three simple swaps change everything:\n      <\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:34px;max-width:1180px;\">\n        <div class=\"xrow anim d3\"><span class=\"from\">check&nbsp;off&nbsp;a&nbsp;task<\u002Fspan><span class=\"arrow\">➜<\u002Fspan><span class=\"to\">earn&nbsp;experience&nbsp;(XP)<\u002Fspan><\u002Fdiv>\n        <div class=\"xrow anim d4\"><span class=\"from\">category<\u002Fspan><span class=\"arrow\">➜<\u002Fspan><span class=\"to\">a skill you level up<\u002Fspan><\u002Fdiv>\n        <div class=\"xrow anim d5\"><span class=\"from\">user<\u002Fspan><span class=\"arrow\">➜<\u002Fspan><span class=\"to\">a hero with their own class<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><div class=\"brand\"><b>PROGRESSIFY<\u002Fb><\u002Fdiv><div class=\"presenter adrian\"><span class=\"dot\"><\u002Fspan>Adrian<\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 4 · KLASY ============ -->\n  <section data-label=\"Classes\">\n    <div class=\"head-block\">\n      <div class=\"eyebrow anim d1\">Hero<\u002Fdiv>\n      <h2 class=\"title-lg anim d2\">Six classes, six disciplines<\u002Fh2>\n      <p class=\"lead anim d2\" style=\"font-size:28px;\">Each class rewards tasks from its assigned skill category differently.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"class-grid\">\n      <div class=\"class-card anim d2\" style=\"--cc:var(--c-archmage);\"><div class=\"cc-icon\">🔮<\u002Fdiv><div class=\"cc-class\">Archmage<\u002Fdiv><div class=\"cc-name\">Spellcraft<\u002Fdiv><div class=\"cc-disc\">Innovation &amp; Design<\u002Fdiv><\u002Fdiv>\n      <div class=\"class-card anim d3\" style=\"--cc:var(--c-mercenary);\"><div class=\"cc-icon\">⚒️<\u002Fdiv><div class=\"cc-class\">Mercenary<\u002Fdiv><div class=\"cc-name\">Taskforge<\u002Fdiv><div class=\"cc-disc\">Execution &amp; Work<\u002Fdiv><\u002Fdiv>\n      <div class=\"class-card anim d4\" style=\"--cc:var(--c-bard);\"><div class=\"cc-icon\">🎭<\u002Fdiv><div class=\"cc-class\">Bard<\u002Fdiv><div class=\"cc-name\">Bard's Delight<\u002Fdiv><div class=\"cc-disc\">Expression &amp; Leisure<\u002Fdiv><\u002Fdiv>\n      <div class=\"class-card anim d3\" style=\"--cc:var(--c-lorekeeper);\"><div class=\"cc-icon\">📖<\u002Fdiv><div class=\"cc-class\">Lorekeeper<\u002Fdiv><div class=\"cc-name\">Scholars' Sanctum<\u002Fdiv><div class=\"cc-disc\">Learning &amp; Research<\u002Fdiv><\u002Fdiv>\n      <div class=\"class-card anim d4\" style=\"--cc:var(--c-paladin);\"><div class=\"cc-icon\">🛡️<\u002Fdiv><div class=\"cc-class\">Paladin<\u002Fdiv><div class=\"cc-name\">Cycle of Order<\u002Fdiv><div class=\"cc-disc\">Routine &amp; Structure<\u002Fdiv><\u002Fdiv>\n      <div class=\"class-card anim d5\" style=\"--cc:var(--c-barbarian);\"><div class=\"cc-icon\">🪓<\u002Fdiv><div class=\"cc-class\">Barbarian<\u002Fdiv><div class=\"cc-name\">Iron Temple<\u002Fdiv><div class=\"cc-disc\">Health &amp; Body<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><div class=\"brand\"><b>PROGRESSIFY<\u002Fb><\u002Fdiv><div class=\"presenter\"><span class=\"dot\"><\u002Fspan>Bartosz<\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 5 · MECHANIKI ============ -->\n  <section data-label=\"Mechanics\">\n    <div class=\"head-block\">\n      <div class=\"eyebrow anim d1\">What drives the game<\u002Fdiv>\n      <h2 class=\"title-lg anim d2\">Progression mechanics<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"feat-grid\">\n      <div class=\"feat anim d2\"><div class=\"f-ic\">⭐<\u002Fdiv><div><div class=\"f-t\">Level system<\u002Fdiv><div class=\"f-d\">XP from tasks raises your hero's level and each skill separately.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"feat anim d3\"><div class=\"f-ic\">🔥<\u002Fdiv><div><div class=\"f-t\">Streaks<\u002Fdiv><div class=\"f-d\">A daily streak for completing at least one task — break it and it resets to zero.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"feat anim d4\"><div class=\"f-ic\">📜<\u002Fdiv><div><div class=\"f-t\">Bounty Board<\u002Fdiv><div class=\"f-d\">Tasks with a category, difficulty, due date and a recurrence option.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"feat anim d5\"><div class=\"f-ic\">🗂️<\u002Fdiv><div><div class=\"f-t\">History<\u002Fdiv><div class=\"f-d\">A full record of completed tasks and the experience earned.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><div class=\"brand\"><b>PROGRESSIFY<\u002Fb><\u002Fdiv><div class=\"presenter\"><span class=\"dot\"><\u002Fspan>Bartosz<\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 6 · ARCHITEKTURA ============ -->\n  <section data-label=\"Architecture\">\n    <div class=\"head-block\">\n      <div class=\"eyebrow anim d1\">Architecture<\u002Fdiv>\n      <h2 class=\"title-lg anim d2\">MVVM + Firebase<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"body-fill\">\n      <div style=\"display:grid;grid-template-columns:1fr auto 1fr auto 1fr auto 1fr;align-items:center;gap:18px;margin-bottom:44px;\">\n        <div class=\"node anim d2\"><div class=\"n-title\">View<\u002Fdiv><div class=\"n-sub\">Jetpack Compose · UI<\u002Fdiv><\u002Fdiv>\n        <div class=\"flow-arrow anim d2\">→<\u002Fdiv>\n        <div class=\"node anim d3\"><div class=\"n-title\">ViewModel<\u002Fdiv><div class=\"n-sub\">State · StateFlow<\u002Fdiv><\u002Fdiv>\n        <div class=\"flow-arrow anim d3\">→<\u002Fdiv>\n        <div class=\"node anim d4\"><div class=\"n-title\">Repository<\u002Fdiv><div class=\"n-sub\">Source of truth<\u002Fdiv><\u002Fdiv>\n        <div class=\"flow-arrow anim d4\">→<\u002Fdiv>\n        <div class=\"node anim d5\" style=\"--line:rgba(57,169,255,.4);border-color:rgba(57,169,255,.4);\"><div class=\"n-title\" style=\"color:var(--c-bard);\">Firestore<\u002Fdiv><div class=\"n-sub\">Cloud · NoSQL<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cols c11\" style=\"flex:none;\">\n        <ul class=\"clean anim d4\">\n          <li><span class=\"bullet\">◆<\u002Fspan><span><b>MVVM<\u002Fb> — clean separation of UI from logic; views only observe state.<\u002Fspan><\u002Fli>\n          <li><span class=\"bullet\">◆<\u002Fspan><span><b>Repository pattern<\u002Fb> — a single source of truth that isolates the data layer.<\u002Fspan><\u002Fli>\n        <\u002Ful>\n        <ul class=\"clean anim d5\">\n          <li><span class=\"bullet\">◆<\u002Fspan><span><b>Firebase Firestore<\u002Fb> — real-time sync and offline mode.<\u002Fspan><\u002Fli>\n          <li><span class=\"bullet\">◆<\u002Fspan><span>Reactive data flow all the way to the Compose layer.<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><div class=\"brand\"><b>PROGRESSIFY<\u002Fb><\u002Fdiv><div class=\"presenter adrian\"><span class=\"dot\"><\u002Fspan>Adrian<\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 7 · DEMO: DODANIE ZADANIA ============ -->\n  <section class=\"demo\" data-label=\"Demo · Adding a task\">\n    <div class=\"head-block\">\n      <div class=\"eyebrow anim d1\">Create<\u002Fdiv>\n      <h2 class=\"title-lg anim d2\">Adding a task<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"cols c11\" style=\"flex:none;align-items:start;\">\n      <ul class=\"clean anim d3\">\n        <li><span class=\"bullet\">▸<\u002Fspan><span><b>Dashboard<\u002Fb> — current level, streak and the list of active tasks.<\u002Fspan><\u002Fli>\n        <li><span class=\"bullet\">▸<\u002Fspan><span>New task: title, <b>category<\u002Fb>, <b>difficulty<\u002Fb>, due date, weekly recurrence.<\u002Fspan><\u002Fli>\n        <li><span class=\"bullet\">▸<\u002Fspan><span><b>Live validation<\u002Fb> — an error before you even hit save.<\u002Fspan><\u002Fli>\n      <\u002Ful>\n      <ul class=\"clean anim d4\">\n        <li><span class=\"bullet\">▸<\u002Fspan><span>Save → the task lands on the Bounty Board.<\u002Fspan><\u002Fli>\n        <li><span class=\"bullet\">▸<\u002Fspan><span><b>Filtering<\u002Fb> by skill category.<\u002Fspan><\u002Fli>\n        <li><span class=\"bullet\">▸<\u002Fspan><span>Overdue tasks get a <b>pulsing indicator<\u002Fb>.<\u002Fspan><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"foot\"><div class=\"brand\"><b>PROGRESSIFY<\u002Fb><\u002Fdiv><div class=\"presenter\"><span class=\"dot\"><\u002Fspan>Bartosz<\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 8 · FIRESTORE & REKURENCJA ============ -->\n  <section data-label=\"Firestore &amp; recurrence\">\n    <div class=\"head-block\">\n      <div class=\"eyebrow anim d1\">Data<\u002Fdiv>\n      <h2 class=\"title-lg anim d2\">Firestore &amp; recurring tasks<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"cols c21\" style=\"flex:none;\">\n      <div class=\"anim d3\">\n        <div class=\"codeblock\">\n<span class=\"c\">// Firestore collection<\u002Fspan>\n<span class=\"k\">users<\u002Fspan>/{uid}/<span class=\"k\">tasks<\u002Fspan>/{taskId}\n{\n  <span class=\"g\">title<\u002Fspan>: <span class=\"s\">\"Calendar test\"<\u002Fspan>,\n  <span class=\"g\">category<\u002Fspan>: <span class=\"s\">\"Scholars' Sanctum\"<\u002Fspan>,\n  <span class=\"g\">difficulty<\u002Fspan>: <span class=\"s\">\"EASY\"<\u002Fspan>,\n  <span class=\"g\">recurrence<\u002Fspan>: <span class=\"s\">\"WEEKLY\"<\u002Fspan>,\n  <span class=\"g\">isDeleted<\u002Fspan>: <span class=\"k\">false<\u002Fspan>,  <span class=\"c\">// soft-delete<\u002Fspan>\n  <span class=\"g\">completedAt<\u002Fspan>: <span class=\"k\">null<\u002Fspan>\n}<\u002Fdiv>\n      <\u002Fdiv>\n      <ul class=\"clean anim d4\" style=\"align-self:center;\">\n        <li><span class=\"bullet\">◆<\u002Fspan><span><b>Soft-delete<\u002Fb> — an <span class=\"hl\">isDeleted<\u002Fspan> flag instead of physical deletion; history stays intact.<\u002Fspan><\u002Fli>\n        <li><span class=\"bullet\">◆<\u002Fspan><span><b>Recurrence<\u002Fb> — completing a recurring task generates the next instance per its interval.<\u002Fspan><\u002Fli>\n        <li><span class=\"bullet\">◆<\u002Fspan><span>A per-user structure isolates data and simplifies security rules.<\u002Fspan><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"foot\"><div class=\"brand\"><b>PROGRESSIFY<\u002Fb><\u002Fdiv><div class=\"presenter adrian\"><span class=\"dot\"><\u002Fspan>Adrian<\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 9 · DEMO: UKOŃCZENIE ZADANIA ============ -->\n  <section class=\"demo\" data-label=\"Demo · Completing a task\">\n    <div class=\"head-block\">\n      <div class=\"eyebrow anim d1\">Progress<\u002Fdiv>\n      <h2 class=\"title-lg anim d2\">Completing a task<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"cols c11\" style=\"flex:none;align-items:start;\">\n      <ul class=\"clean anim d3\">\n        <li><span class=\"bullet\">▸<\u002Fspan><span><b>Complete<\u002Fb> → the card springs, a snackbar shows the XP earned.<\u002Fspan><\u002Fli>\n        <li><span class=\"bullet\">▸<\u002Fspan><span>The dashboard instantly updates the completed counter and streak.<\u002Fspan><\u002Fli>\n      <\u002Ful>\n      <ul class=\"clean anim d4\">\n        <li><span class=\"bullet\">▸<\u002Fspan><span>Enough XP → <b>level up to the next level<\u002Fb>.<\u002Fspan><\u002Fli>\n        <li><span class=\"bullet\">▸<\u002Fspan><span><b>Daily streaks<\u002Fb> — one task a day keeps the streak alive; a missed day resets it.<\u002Fspan><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"foot\"><div class=\"brand\"><b GRESSIFY<\u002Fb><\u002Fdiv><div class=\"presenter adrian\"><span class=\"dot\"><\u002Fspan>Adrian<\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 11 · DEMO: SKILLS I NAWIGACJA ============ -->\n  <section class=\"demo\" data-label=\"Demo · Skills &amp; navigation\">\n    <div class=\"head-block\">\n      <div class=\"eyebrow anim d1\">Skills<\u002Fdiv>\n      <h2 class=\"title-lg anim d2\">Skills &amp; navigation<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"cols c11\" style=\"flex:none;align-items:start;\">\n      <ul class=\"clean anim d3\">\n        <li><span class=\"bullet\">▸<\u002Fspan><span>The skills screen — each category has a <b>level and an XP bar<\u002Fb>.<\u002Fspan><\u002Fli>\n        <li><span class=\"bullet\">▸<\u002Fspan><span>Cards animate in <b>one after another<\u002Fb> every time you open it.<\u002Fspan><\u002Fli>\n      <\u002Ful>\n      <ul class=\"clean anim d4\">\n        <li><span class=\"bullet\">▸<\u002Fspan><span><b>Swipe<\u002Fb> sideways between screens — not just the bottom nav.<\u002Fspan><\u002Fli>\n        <li><span class=\"bullet\">▸<\u002Fspan><span>The detail that makes the whole thing feel <b>smooth<\u002Fb>.<\u002Fspan><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"foot\"><div class=\"brand\"><b>PROGRESSIFY<\u002Fb><\u002Fdiv><div class=\"presenter\"><span class=\"dot\"><\u002Fspan>Bartosz<\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 12 · CATEGORYSTATS I PROFIL ============ -->\n  <section data-label=\"CategoryStats &amp; profile\">\n    <div class=\"head-block\">\n      <div class=\"eyebrow anim d1\">Data model<\u002Fdiv>\n      <h2 class=\"title-lg anim d2\">CategoryStats &amp; profile<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"cols c21\" style=\"flex:none;\">\n      <div class=\"anim d3\">\n        <div class=\"codeblock\">\n<span class=\"c\">// stats per skill category<\u002Fspan>\n<span class=\"k\">data class<\u002Fspan> <span class=\"g\">CategoryStats<\u002Fspan>(\n
